set -g default-terminal "screen-256color"
set -g mouse on
setw -g aggressive-resize off

set -g pane-border-status top
set -g pane-border-format " #T "
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour34'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'wfxr/tmux-power'

# tmux-power theme
set -g @tmux_power_theme 'everforest'
set -g @tmux_power_left_a ' #S'
set -g @tmux_power_left_b ''
set -g @tmux_power_right_y ' %H:%M'
set -g @tmux_power_right_z ' %d %b'

# Allow terminal-notifier and other macOS UI tools to reach the Notification Center from inside tmux
set-option -g default-command "which reattach-to-user-namespace > /dev/null && reattach-to-user-namespace -l $SHELL || $SHELL"

# Initialize tpm (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
